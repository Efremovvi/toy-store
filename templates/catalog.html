<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - Магазин игрушек</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">🧸 Магазин игрушек</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/cart">🛒 Корзина</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>📦 Каталог игрушек</h2>
        
        <div class="mb-4">
            <label class="form-label">Фильтр по категориям:</label>
            <div class="btn-group">
                {% for cat in categories %}
                <a href="/catalog?category={{ cat }}" class="btn btn-outline-primary {% if current_category == cat %}active{% endif %}">
                    {{ cat.title() }}
                </a>
                {% endfor %}
            </div>
        </div>

        <div class="row">
            {% for product in products %}
            <div class="col-md-3 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{ product.name }}</h5>
                        <p class="card-text text-muted">{{ product.description[:60] }}</p>
                        <p class="card-text"><strong>{{ product.price }} ₽</strong></p>
                        <p><span class="badge bg-info">{{ product.category }}</span></p>
                        <div class="d-grid gap-2">
                            <a href="/add-to-cart/{{ product.id }}" class="btn btn-primary btn-sm">В корзину</a>
                        </div>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12">
                <div class="alert alert-info">Товары не найдены</div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
